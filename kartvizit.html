*{margin:0;padding:0;box-sizing:border-box}
@page{size:91mm 61mm;margin:0}
body{background:#666}
.card{width:91mm;height:61mm;position:relative;overflow:hidden;page-break-after:always;font-family:"IBM Plex Sans",sans-serif}
.card:last-child{page-break-after:auto}
/* ---------- FRONT (koyu) ---------- */
.front{background:
  linear-gradient(rgba(233,231,224,.05) 1px,transparent 1px),
  linear-gradient(90deg,rgba(233,231,224,.05) 1px,transparent 1px),#14181E;
  background-size:6mm 6mm,6mm 6mm,auto;color:#E9E7E0}
.front .frame{position:absolute;inset:6mm;border:1px solid #39424E;pointer-events:none}
.front .in{position:absolute;inset:6mm;display:flex;align-items:center;justify-content:space-between;padding:0 5.5mm}
.fname{font-size:15.5pt;font-weight:700;letter-spacing:.01em;line-height:1.05;white-space:nowrap}
.fname span{font-weight:300}
.frole{font-family:"IBM Plex Mono",monospace;font-size:5.6pt;letter-spacing:.24em;color:#F5B324;text-transform:uppercase;margin-top:2.6mm}
.fcontact{font-family:"IBM Plex Mono",monospace;font-size:5.8pt;letter-spacing:.06em;color:#99A0A9;margin-top:4.5mm;line-height:1.9}
.fcontact b{color:#E9E7E0;font-weight:600}
.mono-mark{width:13mm;height:13mm;background:#F5B324;display:grid;place-items:center;flex-shrink:0}
.mono-mark span{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:12.5pt;color:#14181E;letter-spacing:-.02em}
/* ---------- BACK (açık) ---------- */
.back{background:
  linear-gradient(rgba(36,39,43,.05) 1px,transparent 1px),
  linear-gradient(90deg,rgba(36,39,43,.05) 1px,transparent 1px),#F6F5F1;
  background-size:6mm 6mm,6mm 6mm,auto;color:#24272B}
.back .frame{position:absolute;inset:6mm;border:1px solid #24272B;pointer-events:none}
.reg{position:absolute;width:3.4mm;height:3.4mm}
.reg::before,.reg::after{content:"";position:absolute;background:#B36A00}
.reg::before{left:50%;top:0;bottom:0;width:.35mm;transform:translateX(-50%)}
.reg::after{top:50%;left:0;right:0;height:.35mm;transform:translateY(-50%)}
.reg.tl{top:7.2mm;left:7.2mm}.reg.tr{top:7.2mm;right:7.2mm}.reg.bl{bottom:7.2mm;left:7.2mm}.reg.br{bottom:7.2mm;right:7.2mm}
.back .in{position:absolute;inset:6mm;display:flex;align-items:center;gap:6mm;padding:0 7mm}
.qr{width:23mm;height:23mm;color:#24272B;background:#FDFCF9;padding:1.7mm;border:.35mm solid #24272B;flex-shrink:0}
.qr svg{display:block;width:100%;height:100%}
.bk .t{font-family:"IBM Plex Mono",monospace;font-size:6pt;letter-spacing:.22em;color:#8A5200;text-transform:uppercase}
.bk .u{font-family:"IBM Plex Mono",monospace;font-size:9pt;font-weight:600;letter-spacing:.08em;margin-top:1.8mm}
.bk .s{font-family:"IBM Plex Mono",monospace;font-size:5.4pt;letter-spacing:.14em;color:#5B5E64;margin-top:1.4mm;text-transform:uppercase}
.btb{position:absolute;left:6mm;right:6mm;bottom:6mm;display:flex;justify-content:space-between;padding:1.8mm 3mm;border-top:1px solid #C9C7BD;
  font-family:"IBM Plex Mono",monospace;font-size:4.6pt;letter-spacing:.18em;color:#5B5E64;text-transform:uppercase}
